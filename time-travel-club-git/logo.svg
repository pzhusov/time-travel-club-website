<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
  <!-- Background -->
  <rect width="600" height="250" fill="#1A1A1D"/>

  <!-- Main Heading -->
  <text x="300" y="120"
        font-family="Arial, Helvetica, sans-serif"
        font-size="42"
        font-weight="700"
        fill="#E5C590"
        text-anchor="middle"
        letter-spacing="8">TIME TRAVEL CLUB</text>

  <!-- Divider Line -->
  <line x1="150" y1="145" x2="450" y2="145" stroke="#E5C590" stroke-width="2"/>

  <!-- Subheading -->
  <text x="300" y="175"
        font-family="Arial, Helvetica, sans-serif"
        font-size="18"
        font-weight="400"
        fill="#C4A470"
        text-anchor="middle"
        letter-spacing="6">LUXURY CONSULTING</text>
</svg>